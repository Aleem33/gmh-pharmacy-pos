name: Build & Release

on:
  push:
    tags:
      - 'v*'

jobs:
  # ─────────────────────────────────────────────────────────
  # JOB 1 — Windows desktop (.exe + portable installer)
  # ─────────────────────────────────────────────────────────
  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite (Electron mode — base "./" for file:// loading)
        run: node node_modules/vite/bin/vite.js build
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      - name: Package & publish to GitHub Releases
        run: npx electron-builder --win --publish always
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}

  # ─────────────────────────────────────────────────────────
  # JOB 2 — Android APK (signed release build)
  # ─────────────────────────────────────────────────────────
  build-android:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm install --legacy-peer-deps

      - name: Build Vite (Android mode — base "/" for Capacitor server)
        run: npm run build:android
        env:
          NODE_OPTIONS: --max-old-space-size=4096

      # Scaffold android/ on first run if it wasn't committed
      - name: Add Android platform (first-time only)
        run: |
          if [ ! -d "android" ]; then
            echo "android/ not found — scaffolding with Capacitor..."
            npx cap add android
          else
            echo "android/ already committed — skipping scaffold"
          fi

      - name: Sync web build into Android project
        run: npx cap sync android

      - name: Make Gradle wrapper executable
        run: chmod +x android/gradlew

      - name: Build release APK
        run: cd android && ./gradlew assembleRelease --no-daemon

      - name: Sign APK
        run: |
          # Decode keystore from secret
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > /tmp/gmh-release.keystore

          # Find the unsigned APK
          UNSIGNED=$(find android/app/build/outputs/apk/release -name "*unsigned*.apk" | head -1)
          if [ -z "$UNSIGNED" ]; then
            UNSIGNED=$(find android/app/build/outputs/apk/release -name "*.apk" | head -1)
          fi

          TAG="${{ github.ref_name }}"
          SIGNED="android/app/build/outputs/apk/release/GMH-Pharmacy-POS-${TAG}.apk"

          # Find apksigner from whichever build-tools version is installed
          APKSIGNER=$(find $ANDROID_HOME/build-tools -name "apksigner" | sort -V | tail -1)
          echo "Using apksigner: $APKSIGNER"

          $APKSIGNER sign \
            --ks /tmp/gmh-release.keystore \
            --ks-key-alias "${{ secrets.ANDROID_KEY_ALIAS }}" \
            --ks-pass pass:"${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" \
            --key-pass pass:"${{ secrets.ANDROID_KEY_PASSWORD }}" \
            --out "$SIGNED" \
            "$UNSIGNED"

          echo "APK_PATH=$SIGNED" >> $GITHUB_ENV

      - name: Attach APK to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.APK_PATH }}
        env:
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
